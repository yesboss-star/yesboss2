name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: vpsuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/yesboss2
            git pull

            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            deactivate
            cd ..
            ENVIRONMENT=production pm2 restart yesboss-backend

            cd frontend
            npm install
            npm run build
            cd ..
            pm2 restart yesboss-frontend

            pm2 save
