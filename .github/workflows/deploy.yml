name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: vpsuser
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "=== Deploying YesBoss ==="

            # Navigate to project
            cd ~/yesboss2

            # Pull latest code
            echo "[1/4] Pulling latest code..."
            git pull origin main

            # Ensure uploads directory exists on data disk
            sudo mkdir -p /u01/docker-data/uploads

            # Build and start container
            echo "[2/4] Building Docker image..."
            docker compose build --no-cache

            echo "[3/4] Starting container..."
            docker compose up -d

            # Cleanup old images
            echo "[4/4] Cleaning up..."
            docker image prune -f

            echo "=== Deployment complete ==="
            echo "Frontend: http://52.140.177.20:3000"
            echo "Backend:  http://52.140.177.20:8000"
            docker compose ps
